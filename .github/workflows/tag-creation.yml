name: Create Tag

on:
  push:
    branches:
      - main

jobs:
  tag-creation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the commit we push can trigger downstream workflows
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump TOC versions
        run: |
          # Dry-run the tag action to find out what the next version will be,
          # then pass it to bump_version.py before we actually create the tag.
          # mathieudutour/github-tag-action uses semver on commit messages,
          # so we replicate its patch-bump logic here: read the latest tag and +1.
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            # Strip leading v, bump patch
            NEXT=$(echo "${LATEST#v}" | awk -F. '{$NF=$NF+1; print}' OFS=.)
          fi
          echo "Bumping TOC versions to $NEXT"
          python3 bump_version.py "$NEXT"

          # Commit updated TOCs back to main before the tag is created
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/*.toc"
          git diff --cached --quiet || git commit -m "chore: bump TOC versions to $NEXT [skip ci]"
          git push

      - name: Create New Tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          # CRITICAL: We use the PAT here so GitHub allows it to trigger the next workflow
          github_token: ${{ secrets.PAT_TOKEN }}
          default_bump: patch
          tag_prefix: v
