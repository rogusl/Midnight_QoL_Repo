name: Package and Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@master
        with:
          # Keep the clean naming convention for the zip file
          args: -n "{package-name}-v1.0.17"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This overrides the internal version detection completely
          VERSION: v1.0.17
          # This tells CurseForge it is a stable release
          PACKAGE_TYPE: release