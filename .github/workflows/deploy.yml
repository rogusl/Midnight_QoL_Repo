jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # This is the crucial fix: re-checking out the SPECIFIC tag created
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag_action.outputs.new_tag }}
          fetch-depth: 0

      # Optional: Small pause to let GitHub's backend catch up
      - name: Wait for propagation
        run: sleep 10

      - name: Packager
        uses: BigWigsMods/packager@master
        with:
          args: -g 12.0.1 -n "MidnightQoL_Suite-${{ steps.tag_action.outputs.new_tag }}"
          pandoc: true
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}