name: Package and Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@master
        with:
          # FIXED: Changed -r to -t for Release Type
          # Also using the dynamic tag from the bump step
          args: -t release -n "MidnightQoL_Suite-${{ steps.tag_version.outputs.new_tag }}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.tag_version.outputs.new_tag }}
          PACKAGE_TYPE: release