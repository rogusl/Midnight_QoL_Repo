name: Deploy Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # This ensures the second part triggers when a tag is created

jobs:
  # --- PART 1: Create the Tag ---
  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_action.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        id: tag_action
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  # --- PART 2: Package the Release ---
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Packager
        uses: BigWigsMods/packager@master
        with:
          # Now that we are triggered BY the tag, we don't need -t 
          # The packager will automatically see the tag and set 'release' type
          args: -g 12.0.1 -n "MidnightQoL_Suite-${{ github.ref_name }}"
          pandoc: true
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}