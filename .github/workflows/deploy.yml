name: Package and Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      # This ensures the local environment recognizes the tag we just made
      - name: Fetch tags
        run: git fetch --tags --force

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@master
        with:
          # -g 12.0.1: Explicitly tells CurseForge this is for the pre-patch
          # -n: Sets the display name on the CurseForge files tab
          args: -g 12.0.1 -n "MidnightQoL_Suite-${{ steps.tag_version.outputs.new_tag }}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # THE KEY FIXES: These force the "Release" status regardless of prepatch status
          PACKAGE_VERSION: ${{ steps.tag_version.outputs.new_tag }}
          RELEASE_TYPE: release
          CF_RELEASE_TYPE: release
