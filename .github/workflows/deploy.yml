name: Package and Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@master
        with:
          # ADDED -r release: This explicitly tells CurseForge this is a "Release"
          # UPDATED VERSION: Uses the dynamic tag from the previous step
          args: -r release -n "{package-name}-${{ steps.tag_version.outputs.new_tag }}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # These ensure the packager recognizes the specific tag context
          PACKAGE_VERSION: ${{ steps.tag_version.outputs.new_tag }}
          # While PACKAGE_TYPE can work, the -r flag in args is the 'gold standard' for this packager
          PACKAGE_TYPE: release