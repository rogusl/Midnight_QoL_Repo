name: Package and Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      # THE FIX: This forces the local Git HEAD to exactly match the new tag object
      - name: Checkout Newly Created Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag_version.outputs.new_tag }}
          fetch-depth: 0

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@master
        with:
          # -g 12.0.1: Explicitly tells CurseForge this is for the pre-patch
          # -n: Sets the display name on the CurseForge files tab
          args: -g 12.0.1 -n "MidnightQoL_Suite-${{ steps.tag_version.outputs.new_tag }}"
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The manual release overrides have been removed; BigWigs will natively see this as a Release now!